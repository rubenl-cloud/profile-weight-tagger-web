name: Deploy SOCIAREM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh

          printf "%s\n" "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/sociarem_deploy_key
          chmod 600 ~/.ssh/sociarem_deploy_key

          ssh \
            -i ~/.ssh/sociarem_deploy_key \
            -p "${SERVER_PORT:-22}" \
            -o StrictHostKeyChecking=accept-new \
            -o IdentitiesOnly=yes \
            "$SERVER_USER@$SERVER_HOST" \
            "/home/roberto/srv/apps/sociarem/deploy.sh"
